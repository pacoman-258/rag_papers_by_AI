services:
  postgres:
    image: juchunzhijie/paper_db:v1
    platform: linux/amd64
    container_name: pacoman-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pacoman
      POSTGRES_USER: pacoman
      POSTGRES_PASSWORD: "114514"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pacoman -d pacoman"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
